name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # npm trusted publishing (OIDC) + provenance

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # setup-node ships npm 10.x; trusted publishing (OIDC) needs >= 11.5.1.
      # Without this the publish fails on auth in a way that looks nothing like
      # a version problem.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      # nlpp-grammar is a normal registry dependency (^1.0.1), so a plain install
      # pulls the published grammar (WASM included). Nothing is built or linked
      # from the grammar's source here.
      - name: Install dependencies
        run: bun install

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Publish to npm
        run: npm publish --provenance --access public
