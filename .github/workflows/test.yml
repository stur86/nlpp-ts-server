name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # nlpp-grammar is a normal registry dependency (^1.0.1) — a plain install
      # pulls the published grammar (WASM included); nothing is linked from source.
      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test
